# Render Blueprint: deploy the API as a Web Service.
# In the Render dashboard, set environment variables (do not commit secrets):
#   MONGODB_URI, JWT_SECRET, FRONTEND_URL,
#   FLUTTERWAVE_SECRET_KEY, FLUTTERWAVE_PUBLIC_KEY, FLUTTERWAVE_SECRET_HASH
# Webhook URL for Flutterwave: https://<your-service>.onrender.com/api/payments/webhook

services:
  - type: web
    name: automind-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
